name: study_focus_app
description: Study Tracker + Focus Mode App with AI
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # 🌐 API calls
  http: ^1.6.0

  # 📂 File picker (FIXED issue source)
  file_picker: ^6.1.1

  # 💾 Local storage
  shared_preferences: ^2.5.5

  # 🎨 Fonts
  google_fonts: ^6.3.2

  # 🔗 Open links (YouTube etc)
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png